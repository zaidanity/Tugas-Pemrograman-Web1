<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Absensi Mahasiswa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="deco-bg"></div>

  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>

    <div class="stripe"></div>

    <h1>ABSENSI<br>MAHASISWA</h1>

    <div class="info-bar">
      <span class="info-label">MIN 75%</span>
      <span class="info-label">UJIAN</span>
    </div>

    <div class="form-group">
      <label for="nama">NAMA MAHASISWA</label>
      <input type="text" id="nama" placeholder="cth: Budi Santoso">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="hadir">JUMLAH HADIR</label>
        <input type="number" id="hadir" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label for="total">TOTAL PERTEMUAN</label>
        <input type="number" id="total" value="16" min="1">
      </div>
    </div>

    <button onclick="hitung()">HITUNG</button>

    <div class="result" id="result">
      <div class="result-header">HASIL</div>
      <p><span class="result-label">NAMA</span> <span id="rNama" class="result-value"></span></p>
      <p><span class="result-label">HADIR</span> <span id="rHadir" class="result-value"></span> / <span id="rTotal" class="result-value"></span></p>
      <p><span class="result-label">PERSENTASE</span> <span id="rPersen" class="result-value"></span></p>
      <p><span class="result-label">STATUS</span> <span id="rStatus" class="result-value"></span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
