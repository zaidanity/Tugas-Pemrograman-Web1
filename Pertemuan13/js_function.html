<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // function declaration (tanpa parameter)
        function sapa() {
            console.log("Selamat datang di program konversi!");
            alert("Selamat datang di program konversi!");
            document.write("Selamat datang di program konversi!");
        }

        // memanggil function
        sapa();

        // function dengan parameter
        function kurang(a, b) {
            let hasil = a - b;
            console.log(hasil);
        }

        kurang(50, 15);

        // contoh function dengan return value
        function bagi(a, b) {
            return a / b;
        }

        let hasilBagi = bagi(100, 4);
        console.log(hasilBagi);
    </script>
</body>
</html>
