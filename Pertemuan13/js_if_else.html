<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = 5;
        let y = 12;

        // contoh if tanpa else
        if(x < y) {
            console.log("x lebih kecil dari y");
        }

        // contoh if else
        if(x > y) {
            console.log("x lebih besar dari y");
        } else {
            console.log("y lebih besar dari x");
        }

        // contoh nested if (menentukan kategori kecepatan internet)
        let kecepatan = 45; // Mbps
        if(kecepatan >= 100) {
            console.log("Sangat Cepat");
        } else if(kecepatan >= 50) {
            console.log("Cepat");
        } else if(kecepatan >= 20) {
            console.log("Sedang");
        } else if(kecepatan >= 5) {
            console.log("Lambat");
        } else {
            console.log("Sangat Lambat");
        }
    </script>
</body>
</html>
