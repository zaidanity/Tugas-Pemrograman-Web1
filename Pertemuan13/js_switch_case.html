<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tanggal = new Date();
        let bulan = tanggal.getMonth(); // 0 = Januari, 11 = Desember

        switch(bulan) {
            case 0:
                console.log("Januari");
                break;
            case 1:
                console.log("Februari");
                break;
            case 2:
                console.log("Maret");
                break;
            case 3:
                console.log("April");
                break;
            case 4:
                console.log("Mei");
                break;
            case 5:
                console.log("Juni");
                break;
            case 6:
                console.log("Juli");
                break;
            case 7:
                console.log("Agustus");
                break;
            case 8:
                console.log("September");
                break;
            case 9:
                console.log("Oktober");
                break;
            case 10:
                console.log("November");
                break;
            case 11:
                console.log("Desember");
                break;
            default:
                console.log("Bulan tidak valid");
        }
    </script>
</body>
</html>
