<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Mahasiswa</title>
    <style>
        /* Reset standar biar gampang ngatur layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ecf0f1;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #2c3e50;
            font-size: 28px;
        }

        .kartu {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        h3 {
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #bdc3c7;
            padding-bottom: 8px;
        }

        /* Form styling */
        .kotak-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .grup-input {
            display: flex;
            flex-direction: column;
        }

        .grup-input label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #7f8c8d;
        }

        .grup-input input, .grup-input select {
            padding: 8px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .grup-input input:focus, .grup-input select:focus {
            border-color: #3498db;
        }

        .grup-input input[readonly] {
            background-color: #ecf0f1;
            cursor: not-allowed;
        }

        .baris-tombol {
            display: flex;
            gap: 10px;
        }

        /* Button styling standar bgt */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .tombol-biru { background-color: #2980b9; color: #fff; }
        .tombol-biru:hover { background-color: #2471a3; }

        .tombol-kuning { background-color: #f39c12; color: #fff; }
        .tombol-kuning:hover { background-color: #e67e22; }

        .tombol-merah { background-color: #e74c3c; color: #fff; }
        .tombol-merah:hover { background-color: #c0392b; }

        .tombol-abu { background-color: #95a5a6; color: #fff; }
        .tombol-abu:hover { background-color: #7f8c8d; }

        /* Styling tabel */
        .bungkus-tabel {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #bdc3c7;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .tombol-aksi {
            display: flex;
            gap: 5px;
        }

        .tombol-kecil {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
        }

        /* Responsive di HP */
        @media (max-width: 600px) {
            .kotak-form {
                grid-template-columns: 1fr;
            }
            .baris-tombol {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistem Data Mahasiswa</h1>
        </header>

        <!-- Form Input Data -->
        <div class="kartu">
            <h3 id="formTitle">Tambah Data Mahasiswa</h3>
            <form id="mahasiswaForm">
                <div class="kotak-form">
                    <div class="grup-input">
                        <label for="nim">NIM</label>
                        <input type="text" id="nim" placeholder="Contoh: 231011302702" required>
                    </div>
                    <div class="grup-input">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Contoh: Reva Azmi" required>
                    </div>
                    <div class="grup-input">
                        <label for="jurusan">Jurusan</label>
                        <select id="jurusan" required>
                            <option value="">-- Pilih Jurusan --</option>
                            <option value="Teknik Informatika">Teknik Informatika</option>
                            <option value="Sistem Informasi">Sistem Informasi</option>
                            <option value="Teknik Elektro">Teknik Elektro</option>
                            <option value="Teknik Industri">Teknik Industri</option>
                            <option value="Manajemen">Manajemen</option>
                            <option value="Akuntansi">Akuntansi</option>
                        </select>
                    </div>
                    <div class="grup-input">
                        <label for="fakultas">Fakultas</label>
                        <input type="text" id="fakultas" placeholder="Otomatis keisi" readonly>
                    </div>
                </div>

                <div class="baris-tombol">
                    <button type="submit" id="btnSubmit" class="btn tombol-biru">Simpan Data</button>
                    <button type="button" id="btnBatal" class="btn tombol-abu" style="display: none;">Batal Edit</button>
                </div>
            </form>
        </div>

        <!-- Tabel List Data -->
        <div class="kartu">
            <h3>Daftar Mahasiswa</h3>
            <div class="bungkus-tabel">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Jurusan</th>
                            <th>Fakultas</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="listData">
                        <!-- Data bakalan keisi lewat javascript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Mapping jurusan ke fakultas biar user gausah ngetik manual
        const mapFakultas = {
            "Teknik Informatika": "Fakultas Ilmu Komputer",
            "Sistem Informasi": "Fakultas Ilmu Komputer",
            "Teknik Elektro": "Fakultas Teknik",
            "Teknik Industri": "Fakultas Teknik",
            "Manajemen": "Fakultas Ekonomi",
            "Akuntansi": "Fakultas Ekonomi"
        };

        // Otomatis isi fakultas pas jurusan diganti
        document.getElementById('jurusan').addEventListener('change', function() {
            const jurusanPilihan = this.value;
            const fakultasInput = document.getElementById('fakultas');
            
            if (mapFakultas[jurusanPilihan]) {
                fakultasInput.value = mapFakultas[jurusanPilihan];
            } else {
                fakultasInput.value = '';
            }
        });

        // State data mahasiswa (pake localStorage biar ga ilang pas di-refresh)
        let mahasiswaList = JSON.parse(localStorage.getItem('mhs_data')) || [];
        let isEditing = false;
        let indexEdit = null;

        const form = document.getElementById('mahasiswaForm');
        const listContainer = document.getElementById('listData');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnBatal = document.getElementById('btnBatal');
        const formTitle = document.getElementById('formTitle');

        // Fungsi buat ngerender data ke tabel
        function renderTable() {
            listContainer.innerHTML = '';
            
            if (mahasiswaList.length === 0) {
                listContainer.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #999;">Belum ada data mahasiswa.</td></tr>`;
                return;
            }

            mahasiswaList.forEach((mhs, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${mhs.nim}</td>
                    <td>${mhs.nama}</td>
                    <td>${mhs.jurusan}</td>
                    <td>${mhs.fakultas}</td>
                    <td class="tombol-aksi">
                        <button class="btn tombol-kuning tombol-kecil" onclick="setupEdit(${idx})">Edit</button>
                        <button class="btn tombol-merah tombol-kecil" onclick="hapusData(${idx})">Hapus</button>
                    </td>
                `;
                listContainer.appendChild(tr);
            });
        }

        // Event handler pas form disubmit (buat Tambah & Update)
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nim = document.getElementById('nim').value.trim();
            const nama = document.getElementById('nama').value.trim();
            const jurusan = document.getElementById('jurusan').value;
            const fakultas = document.getElementById('fakultas').value;

            // Validasi duplikat NIM (kecuali kalo lagi ngedit data itu sendiri)
            const nimExist = mahasiswaList.find((item, index) => item.nim === nim && index !== indexEdit);
            if (nimExist) {
                alert('Waduh, NIM ini udah dipake sama mahasiswa lain!');
                return;
            }

            if (isEditing) {
                // Update data lama
                mahasiswaList[indexEdit] = { nim, nama, jurusan, fakultas };
                alert('Data mahasiswa berhasil di-update!');
                batalEdit();
            } else {
                // Tambah data baru
                mahasiswaList.push({ nim, nama, jurusan, fakultas });
                alert('Data mahasiswa berhasil disimpan!');
            }

            // Simpan ke localstorage & render ulang
            localStorage.setItem('mhs_data', JSON.stringify(mahasiswaList));
            renderTable();
            form.reset();
        });

        // Masukin data terpilih ke form pas mau ngedit
        function setupEdit(index) {
            isEditing = true;
            indexEdit = index;
            
            const mhs = mahasiswaList[index];
            document.getElementById('nim').value = mhs.nim;
            document.getElementById('nama').value = mhs.nama;
            document.getElementById('jurusan').value = mhs.jurusan;
            document.getElementById('fakultas').value = mhs.fakultas;

            // Ganti tampilan tombol & judul kartu
            formTitle.innerText = "Edit Data Mahasiswa";
            btnSubmit.innerText = "Simpan Perubahan";
            btnSubmit.className = "btn tombol-kuning";
            btnBatal.style.display = "inline-block";
        }

        // Batal edit & reset form ke kondisi awal
        function batalEdit() {
            isEditing = false;
            indexEdit = null;
            form.reset();
            
            formTitle.innerText = "Tambah Data Mahasiswa";
            btnSubmit.innerText = "Simpan Data";
            btnSubmit.className = "btn tombol-biru";
            btnBatal.style.display = "none";
        }

        // Tombol batal di-klik
        btnBatal.addEventListener('click', function() {
            batalEdit();
        });

        // Fungsi hapus data dengan konfirmasi browser standar
        function hapusData(index) {
            const yakin = confirm(`Yakin mau menghapus data si ${mahasiswaList[index].nama}?`);
            if (yakin) {
                mahasiswaList.splice(index, 1);
                localStorage.setItem('mhs_data', JSON.stringify(mahasiswaList));
                renderTable();
                
                // Kalo lagi ngedit data yang dihapus, batalkan editnya
                if (isEditing && indexEdit === index) {
                    batalEdit();
                }
                
                alert('Data berhasil didelete.');
            }
        }

        // Render tabel pas pertama kali halaman dibuka
        renderTable();
    </script>
</body>
</html>
