<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Object Mahasiswa</title>
</head>
<body>
    <script>
        let mahasiswa = [
            { nim: "231011402702", nama: "Reva", fakultas: "Teknik Informatika" },
            { nim: "231011402703", nama: "Zaidan", fakultas: "Sistem Informasi" },
            { nim: "231011402704", nama: "Azmi", fakultas: "Teknik Informatika" },
            { nim: "231011402705", nama: "Adul", fakultas: "Manajemen" },
            { nim: "231011402706", nama: "Mamat", fakultas: "Sistem Informasi" }
        ];
        console.log("Array Mahasiswa:");
        console.log(mahasiswa);

        console.log("Data pertama:", mahasiswa[0]);
        console.log("Nama pertama:", mahasiswa[0].nama);

        for (let i = 0; i < mahasiswa.length; i++) {
            console.log("NIM: " + mahasiswa[i].nim + ", Nama: " + mahasiswa[i].nama + ", Fakultas: " + mahasiswa[i].fakultas);
        }

        console.table(mahasiswa);
    </script>
</body>
</html>
